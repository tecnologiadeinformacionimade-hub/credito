<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Solicitudes · Grupo Imade</title>
    <!-- Tailwind CSS para diseño profesional rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #EEF2F8; color: #0F1A45; }
        .bg-navy { background-color: #1B2B6B; }
        .text-navy { color: #1B2B6B; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Modal Transitions */
        .modal { opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { transform: translateY(-20px); transition: all 0.3s ease; }
        .modal.active .modal-content { transform: translateY(0); }
        
        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4AB3E8; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header -->
    <div class="max-w-7xl mx-auto mb-8 bg-navy text-white rounded-2xl p-6 md:p-8 shadow-lg flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">Panel de Solicitudes</h1>
            <p class="text-blue-200 mt-1">Pinturas y Más, S.A. · Base de datos en tiempo real</p>
        </div>
        <div class="flex gap-3">
            <button onclick="loadData()" class="bg-white/10 hover:bg-white/20 transition px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Actualizar Datos
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto glass-panel rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        
        <!-- Toolbar -->
        <div class="p-6 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" placeholder="Buscar por cliente, NIT..." class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition" onkeyup="filterTable()">
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex gap-2">
                <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-bold shadow-sm border border-green-200" id="countContado">0 Contado</span>
                <span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full text-sm font-bold shadow-sm border border-orange-200" id="countCredito">0 Crédito</span>
            </div>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="dataTable">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                        <th class="p-4 font-bold border-b">Fecha</th>
                        <th class="p-4 font-bold border-b">Tipo</th>
                        <th class="p-4 font-bold border-b">Cliente / Razón Social</th>
                        <th class="p-4 font-bold border-b">NIT</th>
                        <th class="p-4 font-bold border-b">Teléfono</th>
                        <th class="p-4 font-bold border-b text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y divide-gray-100">
                    <tr>
                        <td colspan="6" class="p-12 text-center text-gray-500">
                            <div class="flex flex-col items-center justify-center gap-3">
                                <div class="loader"></div>
                                <p>Cargando información desde la nube...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for Details -->
    <div id="detailsModal" class="modal fixed inset-0 z-50 flex items-center justify-center p-4 bg-navy/60 backdrop-blur-sm">
        <div class="modal-content bg-white w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 class="text-lg font-bold text-navy flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Ficha Completa de Solicitud
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 bg-gray-200/50 hover:bg-gray-200 rounded-full p-1 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto" id="modalBody">
                <!-- Data injected via JS -->
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t flex justify-end">
                <button onclick="closeModal()" class="px-5 py-2 bg-navy text-white rounded-lg font-semibold hover:bg-blue-900 transition shadow-sm">Cerrar Detalles</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // ¡IMPORTANTE! PEGA AQUÍ LA URL QUE TE DIO GOOGLE APPS SCRIPT
        // =========================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxudLUBF8nj4trvpobmmC7TQRuqaqJqbpJdzQapELHE91SNy4ioMNYZV39NkuK_0XXDRQ/exec"; 
        // =========================================================================

        let globalData = [];

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            
            if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbxudLUBF8nj4trvpobmmC7TQRuqaqJqbpJdzQapELHE91SNy4ioMNYZV39NkuK_0XXDRQ/exec") {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold bg-red-50">🚨 Falta configurar la URL de Google Apps Script (SCRIPT_URL) en el código.</td></tr>`;
                return;
            }

            tbody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-gray-500"><div class="flex flex-col items-center justify-center gap-3"><div class="loader border-blue-500"></div><p>Sincronizando con Google Sheets...</p></div></td></tr>`;
            
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                globalData = data;
                renderTable(data);
                updateCounters(data);
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 bg-red-50">Error de conexión. Verifica la SCRIPT_URL o tus permisos.</td></tr>`;
                console.error(error);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">No hay registros almacenados todavía.</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                const isCredito = item.Tipo === 'Crédito';
                const badgeClass = isCredito ? 'bg-orange-100 text-orange-700 border-orange-200' : 'bg-green-100 text-green-700 border-green-200';
                
                // Formateo de fecha
                let fechaFormateada = item.Fecha;
                try {
                    const d = new Date(item.Fecha);
                    if(!isNaN(d.getTime())) {
                        fechaFormateada = d.toLocaleDateString('es-GT', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    }
                } catch(e) {}

                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition border-b border-gray-50 group";
                tr.innerHTML = `
                    <td class="p-4 text-gray-500 whitespace-nowrap">${fechaFormateada || '-'}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold border ${badgeClass}">${item.Tipo || 'N/A'}</span></td>
                    <td class="p-4 font-bold text-navy">${item.nombreRs || '-'}</td>
                    <td class="p-4 text-gray-600 font-mono text-xs">${item.nit || '-'}</td>
                    <td class="p-4 text-gray-600">${item.telefonoWA || '-'}</td>
                    <td class="p-4 text-right">
                        <button onclick="viewDetails(${index})" class="text-blue-500 font-semibold hover:text-blue-700 opacity-0 group-hover:opacity-100 transition px-3 py-1 bg-blue-50 rounded-lg hover:bg-blue-100">Ver Ficha</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateCounters(data) {
            const contado = data.filter(d => d.Tipo === 'Contado').length;
            const credito = data.filter(d => d.Tipo === 'Crédito').length;
            document.getElementById('countContado').textContent = `${contado} Contado`;
            document.getElementById('countCredito').textContent = `${credito} Crédito`;
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalData.filter(item => {
                const searchStr = `${item.nombreRs} ${item.nit} ${item.Tipo} ${item.telefonoWA}`.toLowerCase();
                return searchStr.includes(term);
            });
            renderTable(filtered);
        }

        function viewDetails(index) {
            const item = globalData[index];
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4';

            // Mapea todas las llaves dinámicamente, ignorando firmas o vacías innecesarias
            Object.entries(item).forEach(([key, value]) => {
                if (key === '' || value === '') return;
                
                // Formateo visual del nombre del campo
                const labelName = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                
                const div = document.createElement('div');
                div.className = 'bg-white p-3 rounded-lg border border-gray-100 shadow-sm';
                div.innerHTML = `
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">${labelName}</p>
                    <p class="text-sm font-semibold text-gray-800 break-words">${value}</p>
                `;
                grid.appendChild(div);
            });

            modalBody.appendChild(grid);
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        // Cargar datos al iniciar
        window.onload = loadData;
    </script>
</body>
</html>
